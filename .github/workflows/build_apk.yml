name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate code (drift + riverpod)
        working-directory: flutter_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyse code
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        working-directory: flutter_app
        run: flutter test

      - name: Clean build cache
        working-directory: flutter_app
        run: flutter clean

      - name: Create local.properties
        working-directory: flutter_app/android
        run: |
          # Preserve any values already written by 'flutter pub get' (versionCode, versionName, etc.)
          # and ensure flutter.sdk and sdk.dir are present.
          touch local.properties
          grep -q "^flutter\.sdk=" local.properties || echo "flutter.sdk=$FLUTTER_ROOT" >> local.properties
          grep -q "^sdk\.dir=" local.properties    || echo "sdk.dir=$ANDROID_HOME"    >> local.properties

      - name: Install Gradle and generate wrapper JAR
        working-directory: flutter_app/android
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.9/bin/gradle wrapper --gradle-version=8.9 --distribution-type=all

      - name: Show manifest and local.properties (debug)
        run: |
          echo "=== AndroidManifest.xml ==="
          cat flutter_app/android/app/src/main/AndroidManifest.xml
          echo "=== local.properties ==="
          cat flutter_app/android/local.properties 2>/dev/null || echo "(not found)"

      - name: Build debug APK
        working-directory: flutter_app
        run: flutter build apk --debug --verbose

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: weldtrace-debug-${{ github.sha }}
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Build release APK (unsigned)
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: weldtrace-release-${{ github.sha }}
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
